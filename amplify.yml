version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        - npm run build
  artifacts:
    # SSR build on Amplify's Web Compute platform — Next.js writes its
    # server bundle, static assets, and required-server-files.json into
    # ./.next, which is what Amplify's Compute runtime serves from.
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
