name: Deploy to AWS Amplify

# Push to main → build a static export and ship it to Amplify Hosting via the
# manual-deployment API. Trigger on workflow_dispatch too so you can re-deploy
# without pushing a commit.
on:
  push:
    branches: [main]
  workflow_dispatch:

# A single in-flight deploy at a time — newer pushes cancel older runs to
# avoid two zips racing to become the live revision.
concurrency:
  group: amplify-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write # required if you switch to OIDC (see notes below)

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AMPLIFY_APP_ID: ${{ vars.AMPLIFY_APP_ID }}
      AMPLIFY_BRANCH: ${{ vars.AMPLIFY_BRANCH || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (static export → ./out)
        run: npm run build
        env:
          # Disable Next.js telemetry in CI runs
          NEXT_TELEMETRY_DISABLED: 1

      - name: Sanity-check build output
        run: |
          test -d out || { echo "::error::Expected ./out directory from next export"; exit 1; }
          test -f out/index.html || { echo "::error::Missing out/index.html"; exit 1; }
          echo "Built $(find out -type f | wc -l | tr -d ' ') files."

      - name: Create deploy archive
        run: |
          cd out
          zip -qr ../deploy.zip .
          ls -lh ../deploy.zip

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # --- Option A: long-lived access keys (simpler) ---
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # --- Option B: OIDC (recommended, no static secrets) ---
          # role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          # role-session-name: github-actions-amplify-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Amplify deployment
        id: create
        run: |
          set -euo pipefail
          response=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --output json)
          job_id=$(echo "$response" | jq -r '.jobId')
          upload_url=$(echo "$response" | jq -r '.zipUploadUrl')
          if [[ -z "$job_id" || "$job_id" == "null" ]]; then
            echo "::error::create-deployment did not return a jobId"
            echo "$response"
            exit 1
          fi
          echo "job_id=$job_id"          >> "$GITHUB_OUTPUT"
          echo "::add-mask::$upload_url"
          echo "upload_url=$upload_url"  >> "$GITHUB_OUTPUT"

      - name: Upload archive to presigned URL
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -H "Content-Type: application/zip" \
            --upload-file deploy.zip \
            "${{ steps.create.outputs.upload_url }}"

      - name: Start deployment
        run: |
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "${{ steps.create.outputs.job_id }}"

      - name: Wait for deployment to finish
        run: |
          set -euo pipefail
          job_id="${{ steps.create.outputs.job_id }}"
          deadline=$((SECONDS + 600)) # 10 min cap
          while (( SECONDS < deadline )); do
            status=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "$job_id" \
              --query 'job.summary.status' --output text)
            echo "status=$status"
            case "$status" in
              SUCCEED)   echo "✓ deploy succeeded"; exit 0 ;;
              FAILED|CANCELLED) echo "::error::deploy $status"; exit 1 ;;
              *)         sleep 6 ;;
            esac
          done
          echo "::error::timed out waiting for deployment"
          exit 1

      - name: Summary
        if: always()
        run: |
          domain=$(aws amplify get-branch \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --query 'branch.branchName' --output text 2>/dev/null || echo "$AMPLIFY_BRANCH")
          {
            echo "### Amplify deploy"
            echo ""
            echo "- App: \`$AMPLIFY_APP_ID\`"
            echo "- Branch: \`$domain\`"
            echo "- Job: \`${{ steps.create.outputs.job_id }}\`"
            echo "- Region: \`$AWS_REGION\`"
          } >> "$GITHUB_STEP_SUMMARY"
